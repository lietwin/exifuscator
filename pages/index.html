<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Exifuscator — README</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial; max-width: 860px; margin: 36px auto; padding: 0 18px; line-height:1.6; }
    pre, code { background:#f6f8fa; padding:6px 8px; border-radius:6px; }
    a { color:#0366d6; }
  </style>
</head>
<body>
  <div id="content">Loading README…</div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
    (async function(){
      const rawUrl = 'https://raw.githubusercontent.com/lietwin/exifuscator/master/README.md';
      try {
        const r = await fetch(rawUrl);
        if (!r.ok) throw new Error('Failed to fetch README');
        const md = await r.text();
        document.getElementById('content').innerHTML = marked.parse(md);
      } catch (e) {
        document.getElementById('content').textContent = 'Could not load README: ' + e.message;
      }
    })();
  </script>
</body>
</html>
